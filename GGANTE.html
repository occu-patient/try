<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>勞工健康服務年度計畫管理系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* ── 基礎樣式 ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --sw:300px; --acc:#3d6e94; --acc2:#2c5070; --accl:#dcedf7;
  --hbg:#2c4a62; --sbg:#3d6e94; --bdr:#c0d0da; --text:#1a2b38;
  --muted:#5a7080; --done:#27ae60;
}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;font-size:13px;color:var(--text);background:#eaf0f5;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{background:var(--hbg);color:#fff;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);}
.tb-title{font-size:13px;font-weight:700;flex:1;}
.proj-select{padding:4px;border-radius:4px;background:#fff;color:var(--text);font-size:11px;max-width:140px;outline:none;border:none;cursor:pointer;}
.yr-wrap{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.2);padding:2px 8px;border-radius:4px;}
.yr-btn{width:22px;height:22px;background:none;border:1px solid rgba(255,255,255,.3);border-radius:4px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.yr-num{font-size:15px;font-weight:700;min-width:40px;text-align:center;}
.tb-btn{padding:5px 9px;border-radius:4px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;font-size:11px;white-space:nowrap;}
.tb-btn:hover{background:rgba(255,255,255,.22);}
.tb-btn.prim{background:rgba(255,255,255,.9);color:var(--hbg);font-weight:700;}
.tb-btn.danger{color:#ffb3b3;border-color:rgba(255,100,100,.4);}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);background:#fff;border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.sb-hdr{padding:10px 12px;border-bottom:1px solid var(--bdr);background:#f3f7fa;display:flex;align-items:center;justify-content:space-between;}
.sb-scroll{flex:1;overflow-y:auto;}
.pitem{display:flex;align-items:flex-start;padding:10px 12px;gap:10px;border-bottom:1px solid #eff3f7;cursor:pointer;}
.pitem:hover{background:#f8fbff;}
.pitem.active{background:#eef6ff;}
.pitem-cb{width:16px;height:16px;border:2px solid #ccc;border-radius:4px;margin-top:2px;flex-shrink:0;}
.pitem-cb.on{background:var(--acc);border-color:var(--acc);position:relative;}
.pitem-cb.on::after{content:'✓';color:#fff;font-size:10px;position:absolute;left:2px;top:-1px;}

/* ── GANTT ── */
.g-wrap-outer{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.bar-legend{display:flex;align-items:center;gap:12px;padding:6px 12px;background:#f8fafc;border-bottom:1px solid var(--bdr);font-size:10px;color:var(--muted);}
.gantt-wrap{flex:1;overflow:auto;background:#fff;position:relative;}
table.gt{border-collapse:collapse;table-layout:fixed;background:white;width:100%;}
table.gt th,table.gt td{border:1px solid var(--bdr);padding:6px;vertical-align:middle;}
.th1{background:var(--hbg);color:#fff;font-size:10px;text-align:center;}
.th2{background:var(--sbg);color:#fff;font-size:9px;text-align:center;}
.cd-month{height:40px;position:relative;cursor:pointer;}
.mo-plan{position:absolute;top:6px;left:2px;right:2px;height:12px;border-radius:3px;background:var(--acc);opacity:0.5;}
.mo-done{position:absolute;bottom:6px;left:2px;right:2px;height:12px;border-radius:3px;background:var(--done);}

/* ── MODALS ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9000;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
.open{display:flex !important;}
.m-card{background:#fff;padding:30px;border-radius:15px;width:480px;box-shadow:0 15px 40px rgba(0,0,0,.3);}

/* ── FOOTER ── */
.site-footer{background:var(--hbg);color:rgba(255,255,255,.5);font-size:10.5px;text-align:center;padding:8px;border-top:1px solid rgba(255,255,255,.1);}
.site-footer a{color:#fff;text-decoration:none;font-weight:700;}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-title" id="mainTitle" contenteditable="true" spellcheck="false">勞工健康服務年度計畫管理系統</div>
  
  <select class="proj-select" id="projSelect" onchange="switchProj(this.value)"></select>
  <button class="tb-btn" onclick="newProj()">＋ 新專案</button>
  <button class="tb-btn" onclick="cloneProj()">⎘ 複製當前</button>
  <button class="tb-btn danger" onclick="deleteProj()">🗑 刪除</button>
  <button class="tb-btn" onclick="resetToMasterTemplate()" title="還原至代碼定義的最新計畫清單">♻️ 重置範本</button>

  <div class="yr-wrap">
    <button class="yr-btn" onclick="chgYear(-1)">◀</button>
    <div class="yr-num" id="yrNum">2026</div>
    <button class="yr-btn" onclick="chgYear(1)">▶</button>
  </div>
  
  <button class="tb-btn prim" id="pdfBtn" onclick="exportPDF()">📄 匯出 PDF</button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sb-hdr"><b>計畫清單</b> <button class="tb-btn" style="color:var(--acc); border:1px solid var(--bdr);" onclick="openModal()">＋ 新增項目</button></div>
    <div class="sb-scroll" id="sbList"></div>
  </div>
  <div class="g-wrap-outer">
    <div class="bar-legend">
        <span>圖例：</span>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:20px;height:10px;background:var(--acc);opacity:0.5;border-radius:2px;"></div>預定</div>
        <div style="display:flex;align-items:center;gap:4px;"><div style="width:20px;height:10px;background:var(--done);border-radius:2px;"></div>完成</div>
    </div>
    <div id="ganttWrap" class="gantt-wrap"></div>
  </div>
</div>

<footer class="site-footer">
  僅供個人及學術交流使用，嚴禁任何形式之商業營利 · 商業授權需求請洽作者：<a href="https://www.instagram.com/occu.patient/" target="_blank">IG @occu.patient</a>
</footer>

<div id="discBg" class="modal-bg">
  <div class="m-card">
    <h3 style="color:#c0392b; margin-bottom:15px;">⚠️ 使用者同意條款</h3>
    <div style="font-size:13px; line-height:1.7; color:#444; margin-bottom:25px;">
      歡迎使用「勞工健康服務管理工具」。進入前請詳閱：<br><br>
      1. <b>資料安全</b>：資料採本地儲存技術，僅存於您的瀏覽器中。請勿輸入員工姓名或身分證號，建議以編號代替。<br>
      2. <b>法律效力</b>：本工具僅供行政輔助參考。業務執行應以勞動部及法規最新公告為準。<br>
      3. <b>責任限制</b>：本工具嚴禁商業營利、轉售。作者不對使用結果產生的資料損失或法律責任負責。
    </div>
    <button onclick="discAgree()" style="width:100%; padding:12px; background:var(--hbg); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:700; font-size:14px;">我已閱讀並同意進入</button>
  </div>
</div>
